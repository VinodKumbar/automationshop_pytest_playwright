[pytest]
# Report Configuration
# To generate HTML report: pytest --html=reports/report.html --self-contained-html
# To generate Allure report: pytest --alluredir=reports/allure-results

# Markers for test categorization
markers =
    login: Login tests
    valid_login: Valid login tests
    invalid_login: Invalid login tests
    smoke: Smoke tests
    regression: Regression tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*


